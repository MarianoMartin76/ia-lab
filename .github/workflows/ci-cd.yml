name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check SPEC.md exists
        id: validate
        run: |
          if [ -f "SPEC.md" ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: validate-spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      
      - name: Build backend
        working-directory: backend
        run: npm run build

  build-frontend:
    needs: validate-spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  test-backend:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      
      - name: Push database
        working-directory: backend
        run: npx prisma db push
      
      - name: Run tests
        working-directory: backend
        run: npm test -- --passWithNoTests
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  test-frontend:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

  auto-heal:
    needs: [test-backend, test-frontend]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read
    outputs:
      healed: ${{ steps.heal.outputs.healed }}
      attempt: ${{ steps.heal.outputs.attempt }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Determine attempt number
        id: attempt-check
        run: |
          # Simple approach: default to attempt 1
          # Each failed run will retry, and on retry it will be attempt 2, 3...
          CURRENT=1
          echo "attempt=$CURRENT" >> $GITHUB_OUTPUT
          echo "Attempt set to: $CURRENT"
      
      - name: Run AI Auto-Heal
        if: steps.attempt-check.outputs.attempt <= 3
        id: heal
        run: |
          echo "=== Running AI Auto-Heal (Attempt ${{ steps.attempt-check.outputs.attempt }}/3) ==="
          
          ROOT_DIR=$(pwd)
          echo "Root dir: $ROOT_DIR"
          
          # Create test-results directory in root
          mkdir -p $ROOT_DIR/test-results
          
          echo "Running backend tests..."
          cd $ROOT_DIR/backend
          npm ci
          npx prisma generate
          npx prisma db push
          npm test -- --json --outputFile=$ROOT_DIR/test-results/backend-results.json 2>&1 | tee $ROOT_DIR/test-results/backend-output.log || true
          
          echo "Running frontend tests..."
          cd $ROOT_DIR/frontend
          npm ci
          # Force JSON output and ensure it saves
          npx vitest run --reporter=json --outputFile=vitest.output.json 2>&1 | tee $ROOT_DIR/test-results/frontend-output.log || true
          
          # ALWAYS copy vitest output to test-results (even if test fails)
          pwd
          ls -la vitest.output.json 2>/dev/null && cp vitest.output.json $ROOT_DIR/test-results/frontend-results.json || echo "No vitest output generated"
          
          echo "Test results location: $ROOT_DIR/test-results"
          ls -la $ROOT_DIR/test-results/
          
          # Run AI heal script from root
          cd $ROOT_DIR/scripts/auto-heal
          npm install
          
          # Debug: show available env vars (masked)
          echo "GITHUB_TOKEN exists: ${{ !! secrets.GITHUB_TOKEN }}"
          echo "GH_TOKEN exists: ${{ !! secrets.GH_TOKEN }}"
          
          # Try with explicit token
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          if [ -z "$GH_TOKEN" ]; then
            GH_TOKEN="${{ secrets.GH_TOKEN }}"
          fi
          echo "Using token: ${GH_TOKEN:0:8}..."
          
          export GITHUB_TOKEN="$GH_TOKEN"
          export GH_TOKEN="$GH_TOKEN"
          
          node index.js \
            --test-results $ROOT_DIR/test-results \
            --context-root $ROOT_DIR \
            --ai-provider github-models \
            --max-attempts 3 \
            --current-attempt ${{ steps.attempt-check.outputs.attempt }}
          
          # Check result
          if [ -f $ROOT_DIR/scripts/auto-heal/heal-result.json ]; then
            echo "healed=true" >> $GITHUB_OUTPUT
            echo "attempt=${{ steps.attempt-check.outputs.attempt }}" >> $GITHUB_OUTPUT
          else
            echo "healed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Push fix branch and create PR
        if: steps.heal.outputs.healed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="auto-heal/attempt-${{ steps.heal.outputs.attempt }}-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH_NAME
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-heal: Fix test failures (attempt ${{ steps.heal.outputs.attempt }})"
            git push -u origin $BRANCH_NAME --force || echo "Push failed"
            
            # Create PR
            gh pr create \
              --title "Auto-Heal: Fix test failures (Attempt ${{ steps.heal.outputs.attempt }})" \
              --body "Auto-heal system fixed test failures. Attempt: ${{ steps.heal.outputs.attempt }}/3" \
              --base main || echo "PR creation failed"
          fi
      
      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const healed = '${{ steps.heal.outputs.healed }}' === 'true';
            const attempt = ${{ steps.heal.outputs.attempt }} || 1;
            const maxAttempts = 3;
            
            let body = `### 🤖 Auto-Heal Report (Attempt ${attempt}/${maxAttempts})\n\n`;
            
            if (healed) {
              body += `✅ **Tests Fixed Automatically!**\n`;
              body += `AI analyzed the errors and applied a fix.\n`;
              body += `Branch: \`auto-heal/attempt-${attempt}-${{ github.run_id }}\`\n`;
              body += `\n_Tests will be re-run automatically._`;
            } else {
              body += `❌ **Could Not Auto-Heal**\n`;
              body += `Attempted AI analysis but could not generate a fix.\n`;
              if (attempt >= maxAttempts) {
                body += `\n⚠️ **Max attempts reached. Manual review required.**`;
              } else {
                body += `\n_Will retry on next push._`;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
      
      - name: Summary
        run: |
          if [ "${{ steps.heal.outputs.healed }}" == "true" ]; then
            echo "✅ Auto-heal succeeded!"
          else
            echo "❌ Auto-heal failed. Manual review required."
          fi

  merge:
    needs: [test-backend, test-frontend, auto-heal]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check if should merge
        run: |
          # Check if auto-heal succeeded or tests passed without healing needed
          HEAL_STATUS="${{ needs.auto-heal.outputs.healed }}"
          TEST_STATUS="${{ needs.test-backend.result }}"
          
          echo "Test status: $TEST_STATUS"
          echo "Heal status: $HEAL_STATUS"
          
          # Consider success if tests passed OR auto-heal succeeded
          if [ "$TEST_STATUS" == "success" ]; then
            echo "::notice::Tests passed, ready to merge"
          elif [ "$HEAL_STATUS" == "true" ]; then
            echo "::notice::Auto-heal succeeded, ready to merge"
          else
            echo "::warning::Cannot auto-merge: tests failed and auto-heal couldn't fix"
            exit 1
          fi
